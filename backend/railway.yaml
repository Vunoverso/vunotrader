service: vuno-trader-api

variables:
  APP_NAME: "Vuno Trader API"
  APP_ENV: "production"
  APP_HOST: "0.0.0.0"
  APP_PORT: "$PORT"
  APP_DEBUG: false
  APP_ALLOWED_ORIGINS: "https://vunotrader.vercel.app,https://vunotrader-*.vercel.app"

build:
  builder: dockerfile
  context: .
  dockerfile: Dockerfile

deploy:
  numReplicas: 1
  startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
